services:
  backend:
    build:
      context: .
      dockerfile: graduate_intelligence_platform/backend/Dockerfile
    image: graduate-intelligence-backend:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 8000
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT:-8000}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: graduate_intelligence_platform/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: graduate-intelligence-frontend:prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cliente_a_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: America/Bogota
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_prod_data:
