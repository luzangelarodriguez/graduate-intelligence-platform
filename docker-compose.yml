services:
  postgres:
    image: postgres:16-alpine
    container_name: labor-observatory-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: labor_observatory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labor_observatory"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labor-observatory-api
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/labor_observatory}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      CRAWLER_MAX_CONCURRENCY: ${CRAWLER_MAX_CONCURRENCY:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}"]

  acquisition-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labor-observatory-acquisition-worker
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/labor_observatory}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      CRAWLER_MAX_CONCURRENCY: ${CRAWLER_MAX_CONCURRENCY:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "scripts/run_acquisition.sh"]

  intelligence-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labor-observatory-intelligence-worker
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/labor_observatory}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "scripts/run_intelligence.sh"]

volumes:
  postgres_data:
