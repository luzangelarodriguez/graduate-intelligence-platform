services:
  db:
    image: postgres:16-alpine
    container_name: unir-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: unir_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d unir_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unir-scraper
    restart: unless-stopped
    environment:
      DB_HOST: host.docker.internal
      DB_NAME: cliente_a_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5433
      TZ: America/Bogota
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/var/log
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-dashboard-view
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      DB_HOST: host.docker.internal
      DB_NAME: cliente_a_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5433
      FLASK_SECRET_KEY: change-me-in-production
      TZ: America/Bogota
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:


