name: Ingesta y Matching Pipeline

on:
  push:
    paths:
      - 'storage/test_microcurriculos/**'
  workflow_dispatch:
    inputs:
      program_id:
        description: 'ID de programa específico (vacío = todos)'
        required: false
        default: ''
      steps:
        description: 'Pasos a ejecutar: microcurriculos,acquisition,matching'
        required: false
        default: 'microcurriculos,acquisition,matching'

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "true"
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Verify RAILWAY_DATABASE_URL is set
        run: |
          if [ -z "$RAILWAY_DATABASE_URL" ]; then
            echo "ERROR: secret RAILWAY_DATABASE_URL no está configurado en este repositorio."
            echo "Ir a Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "RAILWAY_DATABASE_URL configurado correctamente."

      - name: "[1/3] Cargar microcurrículos Excel"
        if: ${{ !inputs.steps || contains(inputs.steps, 'microcurriculos') }}
        run: python scripts/load_microcurriculo_excel.py --execute --yes

      - name: "[2/3] Adquirir empleos frescos — data_analytics elempleo"
        if: ${{ !inputs.steps || contains(inputs.steps, 'acquisition') }}
        run: python scripts/run_acquisition.py --domain data_analytics --source elempleo --limit 20

      - name: "[2/3] Adquirir empleos frescos — data_analytics magneto"
        if: ${{ !inputs.steps || contains(inputs.steps, 'acquisition') }}
        run: python scripts/run_acquisition.py --domain data_analytics --source magneto --limit 20

      - name: "[2/3] Adquirir empleos frescos — artificial_intelligence elempleo"
        if: ${{ !inputs.steps || contains(inputs.steps, 'acquisition') }}
        run: python scripts/run_acquisition.py --domain artificial_intelligence --source elempleo --limit 20

      - name: "[2/3] Adquirir empleos frescos — criminology elempleo"
        if: ${{ !inputs.steps || contains(inputs.steps, 'acquisition') }}
        run: python scripts/run_acquisition.py --domain criminology --source elempleo --limit 20

      - name: "[3/3] Recalcular matches semánticos"
        if: ${{ !inputs.steps || contains(inputs.steps, 'matching') }}
        run: |
          if [ -n "${{ inputs.program_id }}" ]; then
            python scripts/run_semantic_matching.py --persist --min-score 40 --program-id ${{ inputs.program_id }}
          else
            python scripts/run_semantic_matching.py --persist --min-score 40
          fi
