name: Ingesta y Matching Pipeline

on:
  push:
    paths:
      - 'storage/test_microcurriculos/**'
  workflow_dispatch:
    inputs:
      program_id:
        description: 'Program ID (optional)'
        required: false
      steps:
        description: 'Steps to run'
        required: false
        default: 'microcurriculos,matching'

permissions:
  contents: read
  actions: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary openpyxl python-dotenv

      - name: Verify secret
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          if [ -z "$RAILWAY_DATABASE_URL" ]; then
            echo "ERROR: RAILWAY_DATABASE_URL not set"
            exit 1
          fi
          echo "Secret OK"

      - name: Load microcurriculums
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: python scripts/load_microcurriculo_excel.py --execute --yes

      - name: Run matching
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          if [ -n "${{ inputs.program_id }}" ]; then
            python scripts/run_semantic_matching.py --persist --min-score 40 --program-id ${{ inputs.program_id }}
          else
            python scripts/run_semantic_matching.py --persist --min-score 40
          fi
