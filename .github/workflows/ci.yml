name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/backend.txt -r requirements/dev.txt
      - name: Compile backend
        run: python -m py_compile graduate_intelligence_platform/backend/app/main.py graduate_intelligence_platform/backend/app/api.py graduate_intelligence_platform/backend/app/auth.py app.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graduate_intelligence_platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: graduate_intelligence_platform/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f graduate_intelligence_platform/backend/Dockerfile -t graduate-intelligence-backend:ci .
      - name: Build frontend image
        run: docker build -f graduate_intelligence_platform/frontend/Dockerfile -t graduate-intelligence-frontend:ci graduate_intelligence_platform/frontend
